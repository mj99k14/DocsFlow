name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "document-routing/backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  # ─── 1단계: 테스트 ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1212"
          POSTGRES_DB: document_routing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            document-routing/backend/requirements.txt
            document-routing/backend/requirements-test.txt

      - name: 의존성 설치
        working-directory: document-routing/backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: 테스트 실행
        working-directory: document-routing/backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: postgresql://postgres:1212@localhost:5432/document_routing_test
        run: pytest -v

  # ─── 2단계: EC2 배포 (SSM) ────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: SSM으로 EC2에 배포
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-06dd782d72c1cda6b" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ec2-user/DocsFlow && git pull origin main",
              "cd document-routing/backend && pip install -r requirements.txt --quiet",
              "sudo systemctl restart docsflow",
              "sudo systemctl is-active docsflow && echo 배포완료"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-06dd782d72c1cda6b"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-06dd782d72c1cda6b" \
            --query "StandardOutputContent" \
            --output text
