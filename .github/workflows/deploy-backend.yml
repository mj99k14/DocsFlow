name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "document-routing/backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  # ─── 1단계: 테스트 ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1212"
          POSTGRES_DB: document_routing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            document-routing/backend/requirements.txt
            document-routing/backend/requirements-test.txt

      - name: 테스트 DB 생성
        run: PGPASSWORD=1212 psql -h localhost -U postgres -c "CREATE DATABASE document_routing_test;"

      - name: 의존성 설치
        working-directory: document-routing/backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: 테스트 실행
        working-directory: document-routing/backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: postgresql://postgres:1212@localhost:5432/document_routing
        run: pytest -v

  # ─── 2단계: EC2 배포 ───────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "▶ 코드 최신화..."
            cd /home/ec2-user/DocsFlow
            git pull origin main

            echo "▶ 패키지 업데이트..."
            cd document-routing/backend
            pip install -r requirements.txt --quiet

            echo "▶ 서비스 재시작..."
            sudo systemctl restart docsflow

            echo "▶ 상태 확인..."
            sudo systemctl is-active docsflow
            echo "✅ 배포 완료"
